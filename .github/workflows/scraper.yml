name: Engoo Daily Scraper

on:
  schedule:
    # 每天台灣時間 06:00 執行（UTC+8，所以 UTC 22:00 前一天）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允許手動觸發（測試用）

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install selenium requests webdriver-manager

      - name: Install ChromeDriver
        run: |
          pip install chromedriver-autoinstall
          python -c "import chromedriver_autoinstall; chromedriver_autoinstall.install()"

      - name: Run scraper
        run: python scraper.py
